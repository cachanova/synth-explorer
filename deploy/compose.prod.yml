name: synth-explorer

services:
  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
      - backend
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    cpus: 0.50
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  app:
    image: ${IMAGE_REF:?IMAGE_REF must be an immutable image digest}
    platform: linux/amd64
    # deploy.sh pulls the new digest explicitly while the workflow has a
    # short-lived registry credential. Restarts and rollback must use the
    # already-verified local image after that credential is removed.
    pull_policy: never
    restart: unless-stopped
    init: true
    environment:
      BIND_ADDR: 0.0.0.0:8787
      STATIC_DIR: /app/web/dist
      EXAMPLES_DIR: /app/examples
      DESIGN_STORE_DIR: /var/lib/synth-explorer/designs
    expose:
      - "8787"
    ports:
      - "127.0.0.1:8787:8787"
    networks:
      - backend
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:size=268435456,mode=1777,noexec,nosuid,nodev
    volumes:
      - design_data:/var/lib/synth-explorer
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    cpus: 3.0
    mem_limit: 6g
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8787/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 4
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  prometheus:
    image: prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    platform: linux/amd64
    restart: unless-stopped
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=1y
      - --storage.tsdb.retention.size=2GB
      - --web.listen-address=127.0.0.1:9090
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    read_only: true
    tmpfs:
      - /tmp:size=67108864,mode=1777,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    cpus: 0.50
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:v1.12.1@sha256:1b4e4438faca4dd7e001dd445d161a4a2091b0fededa84093b3a8dfeae1f1be0
    platform: linux/amd64
    restart: unless-stopped
    network_mode: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --web.listen-address=127.0.0.1:9100
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    cpus: 0.20
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    platform: linux/amd64
    restart: unless-stopped
    network_mode: host
    environment:
      GF_SERVER_HTTP_ADDR: 127.0.0.1
      GF_SERVER_HTTP_PORT: 3000
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
      GF_PLUGINS_PUBLIC_KEY_RETRIEVAL_DISABLED: "true"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_PLUGINS_PREINSTALL_AUTO_UPDATE: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./monitoring/grafana/provisioning/dashboards/synth-explorer.yml:/etc/grafana/provisioning/dashboards/synth-explorer.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    read_only: true
    tmpfs:
      - /tmp:size=67108864,mode=1777,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    cpus: 0.50
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  edge:
  backend:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  design_data:
  prometheus_data:
  grafana_data:
