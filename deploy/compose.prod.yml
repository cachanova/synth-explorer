name: synth-explorer

services:
  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
      - backend
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    cpus: 0.50
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  app:
    image: ${IMAGE_REF:?IMAGE_REF must be an immutable image digest}
    platform: linux/amd64
    # deploy.sh pulls the new digest explicitly while the workflow has a
    # short-lived registry credential. Restarts and rollback must use the
    # already-verified local image after that credential is removed.
    pull_policy: never
    restart: unless-stopped
    init: true
    environment:
      BIND_ADDR: 0.0.0.0:8787
      STATIC_DIR: /app/web/dist
      EXAMPLES_DIR: /app/examples
    expose:
      - "8787"
    networks:
      - backend
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:size=268435456,mode=1777,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    cpus: 3.0
    mem_limit: 6g
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8787/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 4
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

networks:
  edge:
  backend:
    internal: true

volumes:
  caddy_data:
  caddy_config:
