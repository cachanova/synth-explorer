# Optional local/dedicated-worker overlay. Vivado itself and its license stay
# outside the application image and are mounted read-only at runtime.
services:
  # FlexNet discovers node-locked Ethernet IDs through libudev. An isolated
  # Docker network namespace makes that scan fail, so the Vivado deployment
  # uses the worker host's network and hardware-backed VM NIC. Caddy joins the
  # same namespace and reaches the application over loopback only.
  caddy:
    network_mode: host
    networks: !reset []
    ports: !reset []
    environment:
      APP_UPSTREAM: 127.0.0.1:8787

  app:
    network_mode: host
    networks: !reset []
    expose: !reset []
    environment:
      BIND_ADDR: 127.0.0.1:8787
      HOME: /tmp/vivado-home
      VIVADO_BIN: /opt/AMD/2026.1/Vivado/bin/vivado
      XILINXD_LICENSE_FILE: /run/secrets/vivado.lic
    volumes:
      - type: bind
        source: ${VIVADO_INSTALL_ROOT:-/mnt/synth-explorer-vivado/amd/install}
        target: /opt/AMD
        read_only: true
      - type: bind
        source: ${VIVADO_LICENSE_FILE:-/mnt/synth-explorer-vivado/amd/license/Xilinx.lic}
        target: /run/secrets/vivado.lic
        read_only: true
    # One synthesis runs at a time. Leave half a CPU and 2 GiB of host memory
    # for Caddy, Docker, and the OS on the dedicated 4-vCPU / 8-GiB worker.
    tmpfs:
      - /tmp:size=2147483648,mode=1777,nosuid,nodev
    cpus: 3.5
    mem_limit: 6g
    pids_limit: 512
