name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: server
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends yosys

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Check types
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  container:
    name: Production image
    needs:
      - backend
      - frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test deployment state transitions
        run: ./deploy/ops/tests/deploy-test.sh

      - name: Validate optional Vivado overlay
        run: |
          mkdir -p /tmp/vivado-install/2026.1/Vivado
          touch /tmp/vivado.lic
          IMAGE_REF=synth-explorer:ci \
            VIVADO_INSTALL_ROOT=/tmp/vivado-install \
            VIVADO_LICENSE_FILE=/tmp/vivado.lic \
            VIVADO_ACCESS_TOKEN_SHA256=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            docker compose \
              -f deploy/compose.prod.yml \
              -f deploy/compose.vivado.yml \
              config --quiet

      - name: Validate monitoring configuration
        run: |
          jq empty deploy/monitoring/grafana/dashboards/production.json
          docker run --rm \
            --volume "$PWD/deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro" \
            --entrypoint promtool \
            prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893 \
            check config /etc/prometheus/prometheus.yml

      - name: Build production image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: synth-explorer:ci
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            YOSYS_BUILD_JOBS=4
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start production image
        run: |
          docker run --detach --name synth-explorer-ci \
            --publish 127.0.0.1:8787:8787 \
            synth-explorer:ci

      - name: Verify AMD software is not in the image
        run: |
          docker run --rm --entrypoint /bin/sh synth-explorer:ci \
            -c 'test ! -e /opt/AMD'

      - name: Run production smoke test
        run: ./deploy/ops/smoke-test.sh http://127.0.0.1:8787 "${GITHUB_SHA}"

      - name: Install browser smoke dependencies
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run browser smoke test
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8787
        run: npm run test:e2e

      - name: Show application logs on failure
        if: failure()
        run: docker logs synth-explorer-ci || true

      - name: Stop production image
        if: always()
        run: docker rm --force synth-explorer-ci >/dev/null 2>&1 || true
