name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: server
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends yosys

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Check types
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  container:
    name: Production image
    needs:
      - backend
      - frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test deployment state transitions
        run: ./deploy/ops/tests/deploy-test.sh

      - name: Validate optional Vivado overlay
        run: |
          mkdir -p /tmp/vivado-install/2026.1/Vivado
          touch /tmp/vivado.lic
          IMAGE_REF=synth-explorer:ci \
            VIVADO_INSTALL_ROOT=/tmp/vivado-install \
            VIVADO_LICENSE_FILE=/tmp/vivado.lic \
            docker compose \
              -f deploy/compose.prod.yml \
              -f deploy/compose.vivado.yml \
              config --quiet

      - name: Build production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: synth-explorer:ci
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            YOSYS_BUILD_JOBS=4
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start production image
        run: |
          docker run --detach --name synth-explorer-ci \
            --publish 127.0.0.1:8787:8787 \
            synth-explorer:ci

      - name: Verify AMD software is not in the image
        run: |
          docker run --rm --entrypoint /bin/sh synth-explorer:ci \
            -c 'test ! -e /opt/AMD'

      - name: Run production smoke test
        run: ./deploy/ops/smoke-test.sh http://127.0.0.1:8787 "${GITHUB_SHA}"

      - name: Install browser smoke dependencies
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run browser smoke test
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8787
        run: npm run test:e2e

      - name: Show application logs on failure
        if: failure()
        run: docker logs synth-explorer-ci || true

      - name: Stop production image
        if: always()
        run: docker rm --force synth-explorer-ci >/dev/null 2>&1 || true
