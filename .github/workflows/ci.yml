name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust and analysis WASM
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt --target wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.122 --locked

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Run Clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

      - name: Rebuild analysis WASM
        run: ./analysis-wasm/build.sh

      - name: Verify generated analysis WASM is current
        run: git diff --exit-code -- web/src/wasm/analysis

      - name: Upload generated analysis WASM on mismatch
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-analysis-wasm
          path: web/src/wasm/analysis/analysis_bg.wasm
          retention-days: 1

  static-web:
    name: Static browser application
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Verify pinned Yosys artifacts
        working-directory: web/public/yosys
        run: sha256sum --check SHA256SUMS

      - name: Run unit tests
        working-directory: web
        run: npm test

      - name: Run lint
        working-directory: web
        run: npm run lint

      - name: Check types
        working-directory: web
        run: npx tsc -b --pretty false

      - name: Build static application
        working-directory: web
        run: npm run build

      - name: Verify production worker bundles
        working-directory: web
        run: npm run verify:worker

      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run browser-local synthesis tests
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
        run: npm run test:e2e
