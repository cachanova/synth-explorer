name: Monitor production

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor-production
  cancel-in-progress: false

jobs:
  browser-synthesis:
    name: Browser-local synthesis
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Synthesize with no API traffic
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PRODUCTION_URL || 'https://synthexplorer.dev' }}
        run: >-
          npx playwright test e2e/production.e2e.ts e2e/vhdl.e2e.ts
          --grep "synthesizes and analyzes locally|synthesizes VHDL-2008 locally"
