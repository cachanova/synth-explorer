name: Deploy production

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      publish_only:
        description: Build and publish this ref without deploying it
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ (((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.publish_only == false) || (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.run_attempt == 1))) && 'production' || format('production-nondeploy-{0}-{1}', github.run_id, github.run_attempt) }}
  cancel-in-progress: false

env:
  DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  PRODUCTION_URL: https://synthexplorer.dev

jobs:
  build:
    name: Build and publish image
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' &&
         (inputs.publish_only == true || github.ref == 'refs/heads/main')) ||
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.event == 'push' &&
         github.event.workflow_run.head_branch == 'main' &&
         github.event.workflow_run.conclusion == 'success' &&
         github.event.workflow_run.run_attempt == 1)
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.digest.outputs.image_ref }}
    steps:
      - name: Require successful CI for manual deployment
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_ONLY: ${{ inputs.publish_only }}
        run: |
          if [[ "${PUBLISH_ONLY}" == true ]]; then
            count="$(gh api --method GET \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
              -f branch="${GITHUB_REF_NAME}" \
              -f status=success \
              -F per_page=100 \
              --jq "[.workflow_runs[] | select(.head_sha == \"${DEPLOY_SHA}\")] | length")"
          else
            count="$(gh api --method GET \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
              -f branch=main \
              -f event=push \
              -f head_sha="${DEPLOY_SHA}" \
              -f status=success \
              -F per_page=1 \
              --jq '.total_count')"
          fi
          if [[ ! "${count}" =~ ^[0-9]+$ || "${count}" -lt 1 ]]; then
            echo "No successful qualifying CI run for ${DEPLOY_SHA}" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test deployment state transitions
        run: ./deploy/ops/tests/deploy-test.sh

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.DEPLOY_SHA }}
          build-args: |
            BUILD_COMMIT=${{ env.DEPLOY_SHA }}
            YOSYS_BUILD_JOBS=4
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start production image
        run: |
          docker run --detach --name synth-explorer-release \
            --publish 127.0.0.1:8787:8787 \
            "${IMAGE_NAME}:${DEPLOY_SHA}"

      - name: Smoke-test production image
        run: ./deploy/ops/smoke-test.sh http://127.0.0.1:8787 "${DEPLOY_SHA}"

      - name: Install browser smoke dependencies
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Smoke-test production webpage
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8787
        run: npm run test:e2e

      - name: Show application logs on failure
        if: failure()
        run: docker logs synth-explorer-release || true

      - name: Stop production image
        if: always()
        run: docker rm --force synth-explorer-release >/dev/null 2>&1 || true

      - name: Publish commit tag
        run: docker push "${IMAGE_NAME}:${DEPLOY_SHA}"

      - name: Resolve immutable image digest
        id: digest
        shell: bash
        run: |
          digest="$({ docker buildx imagetools inspect \
            "${IMAGE_NAME}:${DEPLOY_SHA}" \
            --format '{{json .Manifest.Digest}}'; } | tr -d '"')"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid image digest: $digest" >&2
            exit 1
          fi
          image_ref="${IMAGE_NAME}@${digest}"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"
          echo "Published $image_ref"

  deploy:
    name: Deploy to Hetzner
    if: github.event_name != 'workflow_dispatch' || inputs.publish_only == false
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://synthexplorer.dev
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Refuse to deploy a stale main commit
        run: |
          current_main="$(git ls-remote --exit-code origin refs/heads/main | cut -f1)"
          if [[ "${current_main}" != "${DEPLOY_SHA}" ]]; then
            echo "Refusing stale deployment: main is ${current_main}, requested ${DEPLOY_SHA}" >&2
            exit 1
          fi

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/production"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/production" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/production" >/dev/null

      - name: Authenticate host to GitHub Container Registry
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          : "${PRODUCTION_HOST:?Set PRODUCTION_HOST in the production environment}"
          : "${PRODUCTION_USER:?Set PRODUCTION_USER in the production environment}"
          printf '%s' "$REGISTRY_TOKEN" | ssh -i "$HOME/.ssh/production" \
            -o BatchMode=yes -o ConnectTimeout=15 -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "docker login ghcr.io --username '${GITHUB_ACTOR}' --password-stdin >/dev/null"

      - name: Upload deployment bundle
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
        run: |
          : "${PRODUCTION_HOST:?Set PRODUCTION_HOST in the production environment}"
          : "${PRODUCTION_USER:?Set PRODUCTION_USER in the production environment}"
          # Bundle the deploy files with flat archive paths (compose files,
          # Caddyfile, ops/...) so the on-host release layout is unchanged even
          # though they live under deploy/ in the repo.
          tar -czf "/tmp/synth-explorer-${DEPLOY_SHA}.tar.gz" \
            -C deploy compose.prod.yml compose.vivado.yml Caddyfile monitoring ops/deploy.sh ops/smoke-test.sh ops/monitoring-smoke.sh ops/edge-smoke.sh \
            -C "${GITHUB_WORKSPACE}" examples/handshake_controller.sv
          scp -i "$HOME/.ssh/production" -o BatchMode=yes \
            -o ConnectTimeout=15 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "/tmp/synth-explorer-${DEPLOY_SHA}.tar.gz" \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}:/tmp/synth-explorer-${DEPLOY_SHA}.tar.gz"

      - name: Install bundle and deploy digest
        env:
          IMAGE_REF: ${{ needs.build.outputs.image_ref }}
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
        run: |
          : "${IMAGE_REF:?Build job did not return an image digest}"
          : "${PRODUCTION_HOST:?Set PRODUCTION_HOST in the production environment}"
          : "${PRODUCTION_USER:?Set PRODUCTION_USER in the production environment}"
          ssh -i "$HOME/.ssh/production" -o BatchMode=yes \
            -o ConnectTimeout=15 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "IMAGE_REF='${IMAGE_REF}' COMMIT_SHA='${DEPLOY_SHA}' RELEASE_ID='${DEPLOY_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}' bash -se" <<'REMOTE'
          set -eu
          base_dir=/opt/synth-explorer
          releases_dir="${base_dir}/releases"
          state_dir="${base_dir}/state"
          release_dir="${releases_dir}/${RELEASE_ID}"
          temporary_dir="${releases_dir}/.${RELEASE_ID}.tmp"
          bundle="/tmp/synth-explorer-${COMMIT_SHA}.tar.gz"

          case "${RELEASE_ID}" in
            *[!a-f0-9-]* | "")
              echo "invalid release id: ${RELEASE_ID}" >&2
              exit 1
              ;;
          esac

          install -d -m 0755 "${releases_dir}" "${state_dir}"
          rm -rf -- "${temporary_dir}"
          test ! -e "${release_dir}"
          install -d -m 0755 "${temporary_dir}"
          tar -xzf "${bundle}" -C "${temporary_dir}"
          rm -f -- "${bundle}"
          mv -- "${temporary_dir}" "${release_dir}"
          cd "${release_dir}"
          SYNTH_EXPLORER_BASE_DIR="${base_dir}" ./ops/deploy.sh "${IMAGE_REF}"
          REMOTE

      - name: Verify production networking and synthesis
        id: external_verify
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
        run: |
          response="$(ssh -i "$HOME/.ssh/production" -o BatchMode=yes \
            -o ConnectTimeout=15 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            'curl --noproxy "*" --ipv6 --fail-with-body --silent --show-error --connect-timeout 5 --max-time 30 https://synthexplorer.dev/healthz')"
          jq --exit-status --arg commit "${DEPLOY_SHA}" \
            '.status == "ok" and .commit == $commit' <<<"${response}" >/dev/null
          ./deploy/ops/edge-smoke.sh "${DEPLOY_SHA}"

      - name: Roll back failed external verification
        if: ${{ failure() && steps.external_verify.outcome == 'failure' }}
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
        run: |
          ssh -i "$HOME/.ssh/production" -o BatchMode=yes \
            -o ConnectTimeout=15 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            'SYNTH_EXPLORER_BASE_DIR=/opt/synth-explorer /opt/synth-explorer/current/ops/deploy.sh --rollback'

      - name: Remove host registry credentials
        if: always()
        continue-on-error: true
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
        run: |
          ssh -i "$HOME/.ssh/production" -o BatchMode=yes \
            -o ConnectTimeout=15 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            'docker logout ghcr.io >/dev/null 2>&1 || true'
