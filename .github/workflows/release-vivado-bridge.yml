name: Release Vivado bridge

on:
  push:
    tags:
      - 'vivado-bridge-v*'

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            asset: synth-explorer-vivado-bridge-linux-x86_64
          - os: windows-2025
            asset: synth-explorer-vivado-bridge-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal

      - name: Build bridge
        run: cargo build --release --locked -p synth-explorer-vivado-bridge

      - name: Stage Linux binary
        if: runner.os == 'Linux'
        run: cp target/release/synth-explorer-vivado-bridge ${{ matrix.asset }}

      - name: Stage Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/release/synth-explorer-vivado-bridge.exe ${{ matrix.asset }}

      - name: Upload release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download build artifacts
        run: gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --dir release-assets

      - name: Publish release
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --title "Synth Explorer Vivado bridge ${GITHUB_REF_NAME#vivado-bridge-v}"
          --generate-notes
          release-assets/*/*
