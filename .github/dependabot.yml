version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    # Security updates are enabled in repository settings. Routine Rust
    # upgrades are coordinated with the pinned toolchain and generated WASM.
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: monthly
    # Security updates remain active, but routine lockfile changes are curated
    # with the supported npm versions and cross-platform optional packages.
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
