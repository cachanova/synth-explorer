<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="20 16 184 162"
  fill="none"
  stroke-linecap="round"
  stroke-linejoin="round"
  role="img"
  aria-labelledby="title"
>
  <title id="title">Synth Explorer XNOR gate drawn as a fish</title>
  <g stroke="#2DD4BF">
    <!-- gate body / fish -->
    <path stroke-width="6" d="M60 40 Q136 44 170 100 Q136 156 60 160 Q100 100 60 40 Z" />
    <!-- xor input arc / tail -->
    <path stroke-width="6" d="M46 40 Q86 100 46 160" />
    <!-- xnor inversion bubble == mouth bubble -->
    <circle stroke-width="6" cx="181" cy="100" r="9" />
    <!-- rising bubble trail -->
    <circle stroke-width="3.2" cx="185" cy="80" r="5" />
    <circle stroke-width="2.6" cx="194" cy="63" r="3.4" />
  </g>
  <!-- eye -->
  <circle stroke="#dde1e6" stroke-width="3.2" cx="122" cy="100" r="24" />
  <circle fill="#dde1e6" cx="122" cy="100" r="10.4" />
</svg>
