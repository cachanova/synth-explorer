    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Synth Explorer" />
    <meta
      property="og:title"
      content="Synth Explorer — Online Verilog &amp; SystemVerilog Synthesis"
    />
    <meta
      property="og:description"
      content="Synthesize RTL with Yosys and explore logic paths, endpoints, fanin, fanout, and source locations—all locally in your browser."
    />
    <meta property="og:url" content="https://www.synthexplorer.dev/" />
    <meta
      property="og:image"
      content="https://www.synthexplorer.dev/og-image.png"

      content="Synth Explorer, browser-based RTL synthesis and circuit analysis"

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Synth Explorer — Online Verilog &amp; SystemVerilog Synthesis"
    />
    <meta
      name="twitter:description"

    />
    <meta
      name="twitter:image:alt"
      content="Synth Explorer, browser-based RTL synthesis and circuit analysis"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Synth Explorer",
        "url": "https://www.synthexplorer.dev/",
        "description": "Browser-based Verilog and SystemVerilog synthesis with structural circuit analysis.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires a modern browser with WebAssembly support",
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Verilog and SystemVerilog synthesis with Yosys",
          "Logical path and endpoint analysis",
          "Fanin and fanout exploration",
          "Source location mapping",
          "Browser-local RTL processing"
        ],
        "sameAs": "https://github.com/cachanova/synth-explorer"
      }
    </script>
    <script>
      // No-FOUC theme bootstrap: apply the saved palette/mode to <html> before
      // first paint. Keys + defaults mirror src/lib/theme.tsx & palettes.ts.
      (function () {
        try {
          var DARK_ONLY = { dracula: 1, synthwave: 1 }
          var palette = localStorage.getItem('se-palette') || 'tidepool'
          var mode = localStorage.getItem('se-mode') || 'system'
          var prefersDark = matchMedia('(prefers-color-scheme: dark)').matches
          var resolved = DARK_ONLY[palette]
            ? 'dark'
            : mode === 'system'
              ? prefersDark
                ? 'dark'
                : 'light'
              : mode
          var root = document.documentElement
          root.dataset.palette = palette
          root.dataset.theme = resolved
        } catch (e) {
          document.documentElement.dataset.palette = 'tidepool'
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root">
      <div
        class="app boot-shell"
        data-testid="boot-shell"
        role="status"
        aria-label="Loading Synth Explorer"
      >
        <header class="app-header">
          <span class="logo">
            <img class="brand-mark" src="/brand-mark.svg" alt="" />
            <span>Synth <span class="accent">Explorer</span></span>
          </span>
        </header>
        <div class="split" aria-hidden="true">
          <div class="boot-pane boot-pane-left">
            <div class="boot-toolbar"></div>
            <div class="boot-file-bar"></div>
            <div class="boot-workspace-status">Restoring workspace…</div>
          </div>
          <div class="divider"></div>
          <div class="boot-pane boot-pane-right">
            <div class="boot-tabs"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
