  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      content="Synthesize RTL in your browser and explore logic paths, endpoints, fanin, fanout, and source locations. Your RTL stays local."
    />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="Synth Explorer" />
    <meta name="theme-color" content="#202225" />
    <link rel="canonical" href="https://www.synthexplorer.dev/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Synth Explorer" />
    <meta
      property="og:title"
      content="Synth Explorer - Online RTL Synthesis Exploration and Analysis"
    />
    <meta
      property="og:description"
      content="Synthesize RTL in your browser and explore logic paths, endpoints, fanin, fanout, and source locations. Your RTL stays local."
    />
    <meta property="og:url" content="https://www.synthexplorer.dev/" />
    <meta
      property="og:image"
      content="https://www.synthexplorer.dev/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Synth Explorer, browser-based RTL synthesis and circuit analysis"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Synth Explorer - Online RTL Synthesis Exploration and Analysis"
    />
    <meta
      name="twitter:description"
      content="Synthesize RTL in your browser and explore logic paths, endpoints, fanin, fanout, and source locations. Your RTL stays local."
    />
    <meta
      name="twitter:image"
      content="https://www.synthexplorer.dev/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="Synth Explorer, browser-based RTL synthesis and circuit analysis"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Synth Explorer",
        "alternateName": "synthexplorer.dev",
        "url": "https://www.synthexplorer.dev/",
        "description": "Synthesize RTL in your browser and explore logic paths, endpoints, fanin, fanout, and source locations. Your RTL stays local.",
        "sameAs": "https://github.com/cachanova/synth-explorer"
      }
    </script>
    <script>
      // No-FOUC theme bootstrap: apply the saved palette/mode to <html> before
      // first paint. Keys + defaults mirror src/lib/theme.tsx & palettes.ts.
      (function () {
        try {
          var DARK_ONLY = { dracula: 1, synthwave: 1 }
          var palette = localStorage.getItem('se-palette') || 'tidepool'
          var mode = localStorage.getItem('se-mode') || 'system'
          var prefersDark = matchMedia('(prefers-color-scheme: dark)').matches
          var resolved = DARK_ONLY[palette]
            ? 'dark'
            : mode === 'system'
              ? prefersDark
                ? 'dark'
                : 'light'
              : mode
          var root = document.documentElement
          root.dataset.palette = palette
          root.dataset.theme = resolved
        } catch (e) {
          document.documentElement.dataset.palette = 'tidepool'
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root">
      <div
        class="app boot-shell"
        data-testid="boot-shell"
        role="status"
        aria-label="Loading Synth Explorer"
      >
        <header class="app-header">
          <h1 class="logo" aria-label="Synth Explorer">
            <img class="brand-mark" src="/brand-mark.svg" alt="" />
            <span>Synth <span class="accent">Explorer</span></span>
          </h1>
          <p class="tagline">Browser-based RTL synthesis &amp; circuit analysis</p>
        </header>
        <div class="mobile-workspace-nav boot-workspace-nav" aria-hidden="true">
          <span class="mobile-workspace-tab active">Editor</span>
          <span class="mobile-workspace-tab">Analysis</span>
        </div>
        <main class="split" aria-hidden="true">
          <div class="boot-pane boot-pane-left">
            <div class="boot-toolbar"></div>
            <div class="boot-file-bar"></div>
            <div class="boot-workspace-status">Restoring workspace…</div>
          </div>
          <div class="divider"></div>
          <div class="boot-pane boot-pane-right">
            <div class="boot-tabs"></div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
